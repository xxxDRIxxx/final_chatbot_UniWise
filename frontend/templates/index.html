<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UW | Main</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='uniwiselogo&text.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=44" />
</head>
<body class="font-inter size-medium">
  <div class="app-shell">

    <header class="app-header">
      <div class="header-left">
        <img src="{{ url_for('static', filename='uniwiselogo.png') }}" alt="UniWise" class="brand-logo" />
        <div class="brand-text">
          <h1 class="brand-title">UniWise</h1>
          <p class="brand-subtitle">Student AI-Querie</p>
        </div>
      </div>
      <div class="top-actions">
        <!-- Added POV Toggle Button -->
        <button class="menu-btn pov-toggle-btn" id="povToggleBtn" type="button" title="Switch to Mobile view" aria-label="Switch to Mobile view">
          <i id="povToggleIcon" class="bi bi-laptop"></i>
        </button>

        <a href="{{ url_for('resources') }}" class="menu-btn" title="Resources"   aria-label="Resources"><i class="bi bi-folder2-open"></i></a>
        <a href="{{ url_for('history') }}"   class="menu-btn" title="History"     aria-label="History"><i class="bi bi-clock-history"></i></a>
        <a href="{{ url_for('settings') }}"  class="menu-btn" title="Settings"    aria-label="Settings"><i class="bi bi-gear"></i></a>
        <a href="{{ url_for('login') }}"     class="menu-btn" title="Admin Login" aria-label="Admin Login"><i class="bi bi-person-lock"></i></a>
      </div>
    </header>

    <main class="app-main" id="appMain">

      <aside class="side-drawer" id="drawer">
        <div class="drawer-toggle-only">
          <label class="apple-switch">
            <input type="checkbox" id="drawerToggleCollapsed" checked>
            <span class="apple-slider"></span>
          </label>
        </div>
        <div class="drawer-shell" id="drawerShell">
          <div class="drawer-top">
            <div class="drawer-titlewrap">
              <div class="drawer-title">History</div>
              <div class="drawer-sub">Recent saved chats</div>
            </div>
            <label class="apple-switch drawer-toggle-inline">
              <input type="checkbox" id="drawerToggle" checked>
              <span class="apple-slider"></span>
            </label>
          </div>
          <div class="drawer-actions">
            <button class="drawer-action-btn" id="newChatBtn" type="button">
              <i class="bi bi-plus-lg"></i><span>New chat</span>
            </button>
            <div class="drawer-search-wrap">
              <i class="bi bi-search"></i>
              <input id="historySearchInput" class="drawer-search-input" type="text" placeholder="Search chats" />
            </div>
          </div>
          <div class="history-label">Recents</div>
          <div class="drawer-body" id="historyList"></div>
          <div class="drawer-ownership">
            <img src="{{ url_for('static', filename='shswbes_bg.png') }}" alt="SHS within BES" class="ownership-logo" />
            <span class="ownership-name">Senior Highschool within Bacoor Elementary School</span>
          </div>
        </div>
      </aside>

      <section class="center-panel">
        <section class="panel">
          <div class="chat-area" id="chatArea"></div>
          <div class="composer-shell">
            <div class="composer">
              <div class="attach-menu" id="attachMenu" hidden>
                <button class="attach-menu-item" id="attachFileBtn"  type="button"><i class="bi bi-paperclip"></i><span>File</span></button>
                <button class="attach-menu-item" id="attachImageBtn" type="button"><i class="bi bi-image"></i><span>Image</span></button>
              </div>
              <div class="composer-row">
                <button class="icon-btn attach-btn" id="attachBtn" type="button" aria-label="Attach file or image">
                  <i class="bi bi-plus-lg"></i>
                </button>
                <textarea class="composer-input" id="userInput" placeholder="Ask UniWise school inquiries..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" type="button" aria-label="Send message">
                  <i class="bi bi-send-fill send-icon" style="margin-left:-2px;"></i>
                  <i class="bi bi-stop-circle-fill stop-icon" hidden></i>
                </button>
              </div>
              <div class="composer-hint" id="composerHint">UniWise responses may contain errors. FAQs are continuously updated.</div>
              <input id="fileInput"  type="file" hidden />
              <input id="imageInput" type="file" accept="image/*" hidden />
            </div>
          </div>
        </section>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}?v=44"></script>
</body>
</html>
