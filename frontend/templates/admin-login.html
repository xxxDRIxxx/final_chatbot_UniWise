<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniWise | Admin Login </title>

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='uniwiselogo&text.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin-login.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <a href="{{ url_for('index') }}" class="back-btn">
    <i class="bi bi-chevron-left"></i>
    <span>Chat</span>
  </a>

  <main class="login-shell">
    <section class="login-card">
      <div class="card-glow"></div>

      <div class="login-header">
        <div class="brand-logo-wrapper">
          <img
            src="{{ url_for('static', filename='uniwiselogo&text.png') }}"
            alt="UniWise Logo"
            class="brand-logo"
          >
        </div>

        <h1>UniWise Admin</h1>
        <p>Secure administrator access</p>
      </div>

      <form method="POST" action="{{ url_for('login') }}" class="login-form">
        <div class="input-group">
          <label for="username">Username</label>
          <div class="input-shell">
            <i class="bi bi-person"></i>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter username"
              autocomplete="username"
              required
            >
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-shell password-shell">
            <i class="bi bi-lock"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            >
            <button
              type="button"
              class="toggle-password"
              id="togglePassword"
              aria-label="Show password"
            >
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        {% if error %}
        <div class="error-box">
          <i class="bi bi-exclamation-circle-fill"></i>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <button type="submit" class="login-btn">
          <i class="bi bi-shield-check"></i>
          <span>Login</span>
        </button>
      </form>
    </section>
  </main>

  <script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";

        togglePassword.innerHTML = isPassword
          ? '<i class="bi bi-eye-slash"></i>'
          : '<i class="bi bi-eye"></i>';

        togglePassword.setAttribute(
          "aria-label",
          isPassword ? "Hide password" : "Show password"
        );
      });
    }
  </script>
</body>
</html>
