<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniWise Admin Login</title>

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='uniwiselogo.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body class="night login-page">
  <div class="login-wrapper">
    <div class="login-card glass login-card-animated">

      <div class="login-header">
        <img src="{{ url_for('static', filename='uniwiselogo.png') }}" alt="UniWise" class="login-logo">
        <h1>UniWise Admin</h1>
        <p>Secure administrator access</p>
      </div>

      {% if error %}
        <div class="login-error">
          {{ error }}
        </div>
      {% endif %}

      <form method="POST" class="login-form">
        <div class="login-field">
          <label for="username">Username</label>
          <input id="username" type="text" name="username" placeholder="Enter your username" required>
        </div>

        <div class="login-field">
          <label for="password">Password</label>

          <div class="password-wrap">
            <input id="password" type="password" name="password" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn">
          <i class="bi bi-shield-lock"></i>
          <span>Login</span>
        </button>
      </form>

    </div>
  </div>

  <script>
    const passwordInput = document.getElementById("password");
    const passwordToggle = document.getElementById("passwordToggle");

    passwordToggle?.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";

      passwordToggle.innerHTML = isPassword
        ? '<i class="bi bi-eye-slash"></i>'
        : '<i class="bi bi-eye"></i>';

      passwordToggle.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
    });
  </script>
</body>
</html>
